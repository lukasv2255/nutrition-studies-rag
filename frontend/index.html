<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nutriční databáze studií</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f5f0;
    --surface: #ffffff;
    --surface2: #f0ede6;
    --border: #e2ddd4;
    --text: #1c1a17;
    --text2: #6b6560;
    --text3: #9e9890;
    --accent: #2d5a3d;
    --accent-light: #eaf2ec;
    --accent-border: #b8d9c0;
    --tag-bg: #f0ede6;
    --strong-evidence: #2d5a3d;
    --mid-evidence: #92600a;
    --weak-evidence: #9e9890;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 40px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  header h1 {
    font-family: 'Lora', serif;
    font-size: 20px;
    font-weight: 400;
    color: var(--text);
    letter-spacing: -0.2px;
  }

  header h1 em { font-style: italic; color: var(--accent); }

  #db-status {
    font-size: 11px;
    color: var(--text3);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3px 10px;
  }
  #db-status.loaded { color: var(--accent); border-color: var(--accent-border); background: var(--accent-light); }

  main {
    flex: 1;
    max-width: 820px;
    width: 100%;
    margin: 0 auto;
    padding: 36px 40px 80px;
    display: flex;
    flex-direction: column;
    gap: 28px;
  }

  /* Query */
  .query-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
  }

  .query-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 10px;
  }

  .query-row { display: flex; gap: 10px; }

  textarea {
    flex: 1;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    color: var(--text);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 11px 14px;
    resize: none;
    min-height: 50px;
    outline: none;
    transition: border-color 0.15s;
    line-height: 1.5;
  }
  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--text3); }

  button#ask-btn {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: #fff;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    padding: 0 20px;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s;
  }
  button#ask-btn:hover { background: #1e3e2a; }
  button#ask-btn:disabled { background: var(--border); color: var(--text3); cursor: not-allowed; }

  .suggestions { margin-top: 12px; display: flex; flex-wrap: wrap; gap: 6px; }
  .sug {
    font-size: 12px; color: var(--text2);
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 20px; padding: 3px 11px; cursor: pointer; transition: all 0.15s;
  }
  .sug:hover { background: var(--accent-light); border-color: var(--accent-border); color: var(--accent); }

  /* Loading */
  #loading { display: none; align-items: center; gap: 10px; color: var(--text2); font-size: 13px; }
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Result */
  #result { display: none; flex-direction: column; gap: 16px; }

  /* Answer card */
  .answer-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .answer-card-head {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .answer-card-head-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text3);
  }

  .evidence-badge {
    font-size: 11px;
    font-weight: 500;
    padding: 3px 10px;
    border-radius: 20px;
  }
  .evidence-strong { background: #e6f2ea; color: var(--strong-evidence); }
  .evidence-mid    { background: #fef3c7; color: var(--mid-evidence); }
  .evidence-weak   { background: var(--surface2); color: var(--text3); }

  .answer-body { padding: 24px; }

  /* Markdown rendering */
  .answer-body h2 {
    font-family: 'Lora', serif;
    font-size: 16px;
    font-weight: 500;
    color: var(--text);
    margin: 20px 0 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }
  .answer-body h2:first-child { margin-top: 0; }

  .answer-body p {
    font-size: 14px;
    line-height: 1.75;
    color: var(--text);
    margin-bottom: 10px;
  }

  .answer-body ul {
    list-style: none;
    margin: 0 0 14px;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .answer-body ul li {
    font-size: 14px;
    line-height: 1.7;
    color: var(--text);
    padding: 10px 14px;
    background: var(--bg);
    border-left: 3px solid var(--accent-border);
    border-radius: 0 6px 6px 0;
  }

  .answer-body strong { font-weight: 500; color: var(--text); }

  .answer-body em {
    font-style: italic;
    color: var(--text2);
  }

  /* Citační čísla */
  .cite {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 18px; height: 18px;
    background: var(--accent-light);
    color: var(--accent);
    border-radius: 4px;
    font-size: 10px;
    font-weight: 500;
    margin-left: 2px;
    vertical-align: middle;
    cursor: pointer;
    transition: background 0.15s;
  }
  .cite:hover { background: var(--accent); color: #fff; }

  /* Závěr box */
  .conclusion-box {
    background: var(--accent-light);
    border: 1px solid var(--accent-border);
    border-radius: 8px;
    padding: 14px 16px;
    margin-top: 4px;
  }
  .conclusion-box p {
    font-size: 14px;
    line-height: 1.7;
    color: var(--text);
    margin: 0;
  }

  /* Sources */
  .sources-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 8px;
  }

  .source-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 6px;
    overflow: hidden;
  }

  .source-summary {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    cursor: pointer;
    list-style: none;
    user-select: none;
  }
  .source-summary::-webkit-details-marker { display: none; }

  .src-num {
    font-size: 10px; font-weight: 500;
    background: var(--text3); color: #fff;
    border-radius: 4px; padding: 1px 6px;
    flex-shrink: 0;
  }

  .src-name {
    font-size: 12px; color: var(--text);
    flex: 1; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis;
  }

  .src-score {
    font-size: 11px; padding: 1px 8px;
    border-radius: 20px; flex-shrink: 0;
  }
  .score-hi { background: var(--accent-light); color: var(--accent); }
  .score-md { background: #fef3c7; color: var(--mid-evidence); }
  .score-lo { background: var(--surface2); color: var(--text3); }

  .src-chevron { color: var(--text3); font-size: 11px; transition: transform 0.2s; }
  details[open] .src-chevron { transform: rotate(90deg); }

  .src-text {
    padding: 10px 14px 12px;
    font-size: 12px; line-height: 1.65;
    color: var(--text2);
    border-top: 1px solid var(--border);
  }

  .error-card {
    background: #fef2f2; border: 1px solid #fca5a5;
    border-radius: 10px; padding: 14px 18px;
    font-size: 13px; color: #b91c1c;
  }
</style>
</head>
<body>

<header>
  <h1>Nutriční databáze <em>studií</em></h1>
  <span id="db-status">načítám...</span>
</header>

<main>
  <div class="query-box">
    <div class="query-label">Dotaz</div>
    <div class="query-row">
      <textarea id="question" rows="2" placeholder="Např. Má kreatin vliv na růst vlasů?"></textarea>
      <button id="ask-btn" onclick="ask()">Hledat →</button>
    </div>
    <div class="suggestions">
      <span class="sug" onclick="fill(this)">Kreatin a vlasy</span>
      <span class="sug" onclick="fill(this)">Vitamín D a imunita</span>
      <span class="sug" onclick="fill(this)">Omega-3 a zánět</span>
      <span class="sug" onclick="fill(this)">Bílkoviny a svaly</span>
      <span class="sug" onclick="fill(this)">Hořčík a spánek</span>
      <span class="sug" onclick="fill(this)">Střevní mikrobiom</span>
    </div>
  </div>

  <div id="loading"><div class="spinner"></div><span>Prohledávám studie...</span></div>
  <div id="result"></div>
</main>

<script>
const API = '';

async function loadStatus() {
  try {
    const r = await fetch(`${API}/status`);
    const d = await r.json();
    const el = document.getElementById('db-status');
    if (d.status === 'ok') {
      el.textContent = `${d.chunks_in_db} úseků`;
      el.className = 'loaded';
    }
  } catch { document.getElementById('db-status').textContent = 'offline'; }
}

function fill(el) {
  document.getElementById('question').value = el.textContent;
  document.getElementById('question').focus();
}

document.getElementById('question').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); ask(); }
});

async function ask() {
  const q = document.getElementById('question').value.trim();
  if (!q) return;
  const btn = document.getElementById('ask-btn');
  const loading = document.getElementById('loading');
  const result = document.getElementById('result');
  btn.disabled = true;
  loading.style.display = 'flex';
  result.style.display = 'none';
  result.innerHTML = '';
  try {
    const res = await fetch(`${API}/ask`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text: q })
    });
    if (!res.ok) { const e = await res.json(); throw new Error(e.detail || 'Chyba'); }
    renderResult(await res.json());
  } catch(err) {
    result.innerHTML = `<div class="error-card">Chyba: ${err.message}</div>`;
    result.style.display = 'flex';
  } finally {
    btn.disabled = false;
    loading.style.display = 'none';
  }
}

function parseAnswer(text) {
  // Rozděl odpověď na sekce podle ## nadpisů
  const sections = [];
  const lines = text.split('\n');
  let current = null;

  for (const line of lines) {
    if (line.startsWith('## ')) {
      if (current) sections.push(current);
      current = { title: line.replace('## ', '').replace(/\*\*/g, '').trim(), lines: [] };
    } else if (line.startsWith('# ')) {
      // Přeskoč hlavní nadpis (bude jako heading stránky)
    } else {
      if (current) current.lines.push(line);
      else if (line.trim()) sections.push({ title: null, lines: [line] });
    }
  }
  if (current) sections.push(current);
  return sections;
}

function isSubheading(line) {
  return /^\*{1,2}[^*].+:\*{0,2}$/.test(line.trim());
}

function formatLine(line) {
  line = line.replace(/^[-]\s*/, '');
  line = line.replace(/^\*(?!\*)\s*/, '');
  line = line.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  line = line.replace(/\*/g, '');
  line = line.replace(/\[(\d+(?:,\s*\d+)*)\]/g, (_, nums) => {
    return nums.split(',').map(n =>
      `<span class="cite" onclick="scrollToSource(${n.trim()})">${n.trim()}</span>`
    ).join('');
  });
  return line;
}

function detectEvidence(text) {
  const lower = text.toLowerCase();
  if (lower.includes('silná') || lower.includes('strong')) return 'strong';
  if (lower.includes('střední') || lower.includes('moderate')) return 'mid';
  return 'weak';
}

function renderResult(data) {
  const result = document.getElementById('result');
  const sections = parseAnswer(data.answer);
  const evidenceLevel = detectEvidence(data.answer);

  const badgeClass = evidenceLevel === 'strong' ? 'evidence-strong' : evidenceLevel === 'mid' ? 'evidence-mid' : 'evidence-weak';
  const badgeText = evidenceLevel === 'strong' ? 'Silné důkazy' : evidenceLevel === 'mid' ? 'Střední důkazy' : 'Slabé důkazy';

  let bodyHtml = '';

  for (const section of sections) {
    if (!section.title && !section.lines.length) continue;

    const nonEmpty = section.lines.filter(l => l.trim());
    if (!nonEmpty.length && !section.title) continue;

    // Detekuj jestli je to sekce se závěrem
    const isConclusion = section.title && (section.title.toLowerCase().includes('závěr') || section.title.toLowerCase().includes('conclusion'));
    // Detekuj sílu důkazů
    const isEvidence = section.title && section.title.toLowerCase().includes('síla');

    if (section.title) {
      bodyHtml += `<h2>${section.title}</h2>`;
    }

    // Rozhodni jestli jsou to odrážky nebo odstavce
    const isList = nonEmpty.some(l => l.trim().startsWith('-') || l.trim().startsWith('*'));

    if (isConclusion) {
      const text = nonEmpty.map(l => formatLine(l)).join(' ');
      bodyHtml += `<div class="conclusion-box"><p>${text}</p></div>`;
    } else if (isEvidence) {
      // Síla důkazů — kompaktní
      const text = nonEmpty.map(l => formatLine(l)).join(' ');
      bodyHtml += `<p>${text}</p>`;
    } else if (isList) {
      bodyHtml += '<ul>';
      for (const line of nonEmpty) {
        if (isSubheading(line)) {
          // *Role vitamínu D:** => podnadpis uvnitř sekce
          const clean = line.trim().replace(/^\*+/, '').replace(/\*+$/, '').replace(/:$/, '');
          bodyHtml += `</ul><p><strong>${clean}:</strong></p><ul>`;
        } else if (line.trim().startsWith('-') || line.trim().startsWith('*')) {
          bodyHtml += `<li>${formatLine(line)}</li>`;
        } else if (line.trim()) {
          bodyHtml += `<li>${formatLine(line)}</li>`;
        }
      }
      bodyHtml += '</ul>';
    } else {
      for (const line of nonEmpty) {
        if (line.trim()) bodyHtml += `<p>${formatLine(line)}</p>`;
      }
    }
  }

  // Sestav hlavní card
  let html = `
    <div class="answer-card">
      <div class="answer-card-head">
        <span class="answer-card-head-label">Odpověď</span>
        <span class="evidence-badge ${badgeClass}">${badgeText}</span>
      </div>
      <div class="answer-body">${bodyHtml}</div>
    </div>
  `;

  // Zdroje
  if (data.sources && data.sources.length) {
    html += `<div><div class="sources-label">Použité úseky ze studií</div>`;
    data.sources.forEach((s, i) => {
      const pct = Math.round(s.relevance * 100);
      const sc = pct >= 75 ? 'score-hi' : pct >= 55 ? 'score-md' : 'score-lo';
      html += `
        <details class="source-item" id="source-${i+1}">
          <summary class="source-summary">
            <span class="src-num">${i+1}</span>
            <span class="src-name">${esc(s.filename)}</span>
            <span class="src-score ${sc}">${pct}%</span>
            <span class="src-chevron">›</span>
          </summary>
          <div class="src-text">${esc(s.text.substring(0, 500))}${s.text.length > 500 ? '…' : ''}</div>
        </details>`;
    });
    html += '</div>';
  }

  result.innerHTML = html;
  result.style.display = 'flex';
  result.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function scrollToSource(n) {
  const el = document.getElementById(`source-${n}`);
  if (el) { el.open = true; el.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

loadStatus();
</script>
</body>
</html>
